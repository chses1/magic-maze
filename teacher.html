<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>魔法迷宮｜教師後台</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    .teacherToolsGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;}
    .editorSection{margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);}
    .editorTwoCol{display:grid;grid-template-columns:minmax(280px,1.1fr) minmax(320px,.9fr);gap:14px;align-items:start;}
    .mapPalette{display:grid;grid-template-columns:repeat(auto-fit,minmax(86px,1fr));gap:8px;}
    .mapToolBtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-height:64px;padding:8px 6px;text-align:center;font-weight:800;line-height:1.25;background:rgba(255,255,255,.05);}
    .mapToolBtn small{font-size:11px;color:var(--muted);font-weight:700;}
    .mapToolBtn.active{outline:2px solid rgba(124,92,255,.7);background:rgba(124,92,255,.18);}
    .mapEditorWrap{padding:12px;border-radius:16px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.08);overflow:auto;}
    .mapEditorGrid{display:grid;gap:6px;justify-content:start;align-content:start;width:max-content;user-select:none;}
    .mapEditorCell{width:34px;height:34px;border-radius:10px;border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-weight:900;cursor:pointer;background:rgba(255,255,255,.05);}
    .mapEditorCell.wall{background:rgba(35,28,85,.80);border-color:rgba(180,140,255,.22);}

    .mapSymbol{display:inline-flex;align-items:center;justify-content:center;line-height:1;}
    .symbol-portal{display:inline-flex;align-items:center;justify-content:center;transform:translateY(1px);font-size:22px;font-weight:900;}
    .symbol-portal-blue{color:#38bdf8;text-shadow:0 0 6px rgba(56,189,248,.38);}
    .symbol-portal-purple{color:#a855f7;text-shadow:0 0 6px rgba(168,85,247,.38);}
    .symbol-portal-red{color:#f87171;text-shadow:0 0 6px rgba(248,113,113,.38);}
    .mapSymbolImg,.symbol-gold-img{width:22px;height:22px;object-fit:contain;display:inline-block;vertical-align:middle;filter:drop-shadow(0 0 4px rgba(255,210,110,.22));}
    .mapEditorCell.path{background:rgba(255,255,255,.04);}
    .mapEditorCell.start{background:rgba(78,227,165,.16);border-color:rgba(78,227,165,.26);}
    .mapEditorCell.key{background:rgba(124,92,255,.14);border-color:rgba(124,92,255,.25);}
    .mapEditorCell.exit{background:rgba(255,210,110,.16);border-color:rgba(255,210,110,.28);}
    .mapEditorCell.trap{background:rgba(255,92,124,.14);border-color:rgba(255,92,124,.28);}
    .mapEditorCell.portal{background:rgba(49,208,255,.14);border-color:rgba(49,208,255,.22);}
    .mapEditorCell.portal-blue{background:rgba(49,208,255,.16);border-color:rgba(49,208,255,.28);}
    .mapEditorCell.portal-purple{background:rgba(168,85,247,.16);border-color:rgba(168,85,247,.28);}
    .mapEditorCell.portal-red{background:rgba(248,113,113,.16);border-color:rgba(248,113,113,.28);}
    .mapEditorCell.item{background:rgba(78,227,165,.14);border-color:rgba(78,227,165,.25);}
    .mapEditorCell.equipment{background:rgba(255,146,64,.14);border-color:rgba(255,146,64,.25);}
    .mapEditorCell.gear{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.24);}
    .mapEditorCell.tree{background:rgba(34,197,94,.14);border-color:rgba(34,197,94,.26);}
    .mapEditorCell.bookshelf{background:rgba(245,158,11,.16);border-color:rgba(245,158,11,.28);}
    .mapEditorCell.ice{background:rgba(125,211,252,.16);border-color:rgba(125,211,252,.28);}
    .mapEditorCell.lava{background:rgba(56,189,248,.16);border-color:rgba(56,189,248,.30);}
    .mapEditorCell.monster{background:rgba(192,132,252,.16);border-color:rgba(192,132,252,.28);}
    .mapEditorCell.flame{background:rgba(251,146,60,.16);border-color:rgba(251,146,60,.28);}
    .editorActions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}
    .editorActions button{flex:0 0 auto;}
    .mapHintBox{margin-top:10px;padding:10px 12px;border-radius:14px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.08);}
    .mapHintBox code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;}
    textarea#editMapText{min-height:240px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;line-height:1.5;resize:vertical;}
    
    .teacherToolbarRow{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:10px;}
    .teacherToolbarGroup{display:flex;flex-direction:column;gap:6px;min-width:180px;}
    .teacherToolbarGroup label{margin:0;font-size:12px;color:var(--muted);}
    .teacherToolbarGroup select{padding:8px 10px;}
    .teacherSummaryGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:10px;}
    .teacherSummaryGridCompact .teacherSummaryCard{padding:12px 14px;}
    .teacherSummaryCard{padding:14px 16px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);}
    .teacherSummaryCard .num{font-size:24px;font-weight:900;line-height:1.1;margin-top:4px;}
    .teacherLegend{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 10px;}
    .teacherLegendItem{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);font-size:13px;}
    .teacherDot{width:14px;height:14px;border-radius:4px;display:inline-block;border:1px solid rgba(255,255,255,.14);}
    .teacherDot.none{background:rgba(255,255,255,.06);}
    .teacherDot.one{background:#86efac;}
    .teacherDot.two{background:#22c55e;}
    .teacherDot.three{background:#fbbf24;}
    .teacherDot.boss{background:#ef4444;}
    .progressBoardWrap{overflow:auto;border-radius:18px;border:1px solid rgba(255,255,255,.10);background:rgba(7,12,28,.34);max-height:calc(100vh - 280px);}
    .progressBoard{width:max-content;min-width:100%;border-collapse:separate;border-spacing:0;}
    .progressBoard th,.progressBoard td{border-right:1px solid rgba(255,255,255,.08);border-bottom:1px solid rgba(255,255,255,.08);padding:0;text-align:center;vertical-align:middle;}
    .progressBoard thead th{position:sticky;top:0;z-index:3;background:#17203f;}
    .progressBoard .studentCol{position:sticky;left:0;z-index:2;min-width:170px;max-width:170px;text-align:left;background:#111a33;}
    .progressBoard thead .studentCol{z-index:4;background:#1a2347;}
    .progressBoard .actionCol{min-width:76px;background:#0f1730;}
    .progressBoard thead .actionCol{z-index:3;background:#1a2347;}
    .progressBoard .worldHead{font-size:13px;font-weight:900;color:#fff;padding:12px 8px;}
    .progressBoard .levelHead{padding:8px 4px;font-size:11px;line-height:1.2;color:#dbe5ff;min-width:48px;background:#162142;}
    .progressBoard .studentMeta{padding:8px 10px;display:flex;flex-direction:column;gap:3px;}
    .progressBoard .studentName{font-weight:900;color:#fff;font-size:13px;line-height:1.15;}
    .progressBoard .studentSub{font-size:11px;color:var(--muted);line-height:1.25;}
    .progressBoard .statusCell{width:48px;height:42px;position:relative;}
    .progressBoard .statusBtn{width:100%;height:100%;border:none;border-radius:0;background:transparent;color:#fff;font-weight:900;font-size:11px;padding:0;}
    .progressBoard .statusBtn:hover{transform:none;filter:brightness(1.08);}
    .progressBoard .statusBtn.none{background:rgba(255,255,255,.04);color:#7d89b8;}
    .progressBoard .statusBtn.one{background:#86efac;color:#14532d;}
    .progressBoard .statusBtn.two{background:#22c55e;color:#0b1b10;}
    .progressBoard .statusBtn.three{background:#fbbf24;color:#2b1b00;}
    .progressBoard .statusBtn.boss{background:#dc2626;}
    .progressBoard .statusBtn.hasScoreOnly{background:#7c3aed;}
    .progressBoard .cellMain{display:block;font-size:13px;line-height:1;}
    .progressBoard .cellSub{display:block;font-size:9px;opacity:.92;margin-top:2px;}
    .progressBoard .rowAction{padding:0 4px;background:#0f1730;}
    .progressBoard .rowAction button{margin:0;font-size:11px;padding:6px 6px;}
    .progressBoard .world-W1{background:#334155 !important;}
    .progressBoard .world-W2{background:#065f46 !important;}
    .progressBoard .world-W3{background:#92400e !important;}
    .progressBoard .world-W4{background:#1d4ed8 !important;}
    .teacherEmptyState{padding:18px;border-radius:16px;background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.10);}


    body.teacher-backstage-page{
      min-height:100vh;
      background:
        radial-gradient(1200px 700px at 20% 10%, #1a1d4d 0%, #0b1020 60%),
        linear-gradient(180deg, #0b1020 0%, #121933 100%);
      background-attachment:fixed;
    }
    .teacherShell{padding-top:18px;padding-bottom:24px;}
    .teacherHeader{align-items:flex-start;margin-bottom:16px;}
    .teacherBrand h1{color:#fff1c7;}
    .teacherBrand p{margin-top:6px;color:rgba(248,244,234,.82);font-size:14px;}
    .teacherTopActions{display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-wrap:wrap;}
    .teacherTopActions .badge,
    .teacherTopActions button{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,231,173,.18);
      box-shadow:0 10px 24px rgba(0,0,0,.22);
    }
    .teacherTopActions button:hover{filter:brightness(1.05);}
    .teacherTopGrid{display:grid;grid-template-columns:minmax(320px,.9fr) minmax(0,1.25fr);gap:14px;align-items:start;}
    .teacherLoginInlineCard,.teacherQuickCard,.teacherCompactCard{
      background:linear-gradient(180deg, rgba(10,16,28,.52), rgba(10,16,28,.38));
      border:1px solid rgba(255,255,255,.16);
      box-shadow:0 20px 50px rgba(0,0,0,.38);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }
    .teacherInlineRow{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:end;}
    .teacherInlineField label{margin-top:0;}
    .teacherLoginBtn{min-width:96px;height:44px;}
    .teacherToastLine{min-height:22px;margin-top:10px;font-size:13px;font-weight:800;color:#ffe39a;}
    .teacherCardHead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;}
    .teacherCardHead h2{margin:0;font-size:20px;line-height:1.2;}
    .teacherCardTitleRow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-width:0;}
    .teacherAutoSyncBadge{font-size:12px;padding:6px 9px;background:rgba(78,227,165,.10);border-color:rgba(78,227,165,.24);color:#d8fff0;}
    .teacherCollapseBtn{flex:0 0 auto;min-width:96px;padding:8px 12px;border-radius:12px;font-weight:900;background:rgba(255,255,255,.08);border:1px solid rgba(255,231,173,.20);}
    .teacherToolsBody{display:block;}
    #teacherToolsCard.is-collapsed .teacherToolsBody{display:none !important;}
    #teacherToolsCard.is-collapsed{padding-bottom:12px;}
    .teacherCompactGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
    .teacherActionBar{margin-top:12px;}
    .teacherToolsGridCompact{grid-template-columns:repeat(2,minmax(220px,1fr));}
    .teacherEditorSection{margin-top:16px;padding-top:16px;}
    .teacherCompactCard .small{color:rgba(248,244,234,.78);}    
    .teacherHiddenAuth{display:none !important;}
    .teacherToastLine{color:#ffe39a;text-shadow:0 2px 8px rgba(0,0,0,.28);}
    .teacherCardHead h2{color:#fff0c8;}
    .teacherPanelTools{display:grid;grid-template-columns:minmax(180px,220px) minmax(180px,220px) auto;gap:12px;align-items:end;margin-bottom:12px;}
    .teacherPanelTools label{margin-top:0;color:rgba(248,244,234,.78);}
    .teacherPanelTools .btnbar{margin-top:0;justify-content:flex-start;}
    .teacherPanelTools button.primary{background:linear-gradient(180deg,#ffd677 0%,#d79a38 100%) !important;color:#3d2508 !important;border:1px solid rgba(143,88,25,.38) !important;}
    .teacherPanelTools button.danger{background:rgba(255,92,124,.18);}
    @media (max-width: 980px){.teacherPanelTools{grid-template-columns:1fr;}}


    .portal-glyph{display:inline-block;width:22px;height:22px;background-repeat:no-repeat;background-position:center;background-size:contain;filter:drop-shadow(0 0 6px rgba(255,255,255,.10));}
    .portal-glyph-blue{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><radialGradient id='g' cx='50%25' cy='50%25' r='50%25'><stop offset='0%25' stop-color='%23ffffff'/><stop offset='18%25' stop-color='%23d9f4ff'/><stop offset='36%25' stop-color='%2398e7ff'/><stop offset='62%25' stop-color='%2338bdf8'/><stop offset='100%25' stop-color='%230ea5e9'/></radialGradient></defs><path d='M33 6c9 1 17 8 18 17 1 6-1 11-5 15-3 3-7 5-10 8-4 3-5 8-3 12-5-2-8-7-7-12 1-6 6-8 10-11 4-2 7-5 8-10 1-7-4-14-11-19Z' fill='url(%23g)' opacity='.96'/><path d='M28 12c-9 2-15 10-14 19 1 5 4 9 8 12 4 3 9 4 13 7 4 3 6 8 5 13 4-3 6-8 5-13-1-6-6-9-11-12-4-2-7-4-8-8-2-7 1-13 6-18 2-2 4-3 6-4-3 1-6 2-10 4Z' fill='%2322d3ee' opacity='.88'/><path d='M36 24c5 1 9 5 9 10s-4 9-9 10c-5 1-10-2-12-7-1-4 0-8 3-10 2-2 5-3 9-3Z' fill='%2302567f' opacity='.35'/><path d='M37 27c3 1 5 4 5 7s-2 6-5 7c-3 1-7 0-9-3-2-3-2-6 0-8 2-3 5-4 9-3Z' fill='none' stroke='%23ffffff' stroke-width='2.8' stroke-linecap='round' opacity='.85'/></svg>");}
    .portal-glyph-purple{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><radialGradient id='g' cx='50%25' cy='50%25' r='50%25'><stop offset='0%25' stop-color='%23ffffff'/><stop offset='18%25' stop-color='%23f3e8ff'/><stop offset='36%25' stop-color='%23d8b4fe'/><stop offset='62%25' stop-color='%23a855f7'/><stop offset='100%25' stop-color='%237e22ce'/></radialGradient></defs><path d='M33 6c9 1 17 8 18 17 1 6-1 11-5 15-3 3-7 5-10 8-4 3-5 8-3 12-5-2-8-7-7-12 1-6 6-8 10-11 4-2 7-5 8-10 1-7-4-14-11-19Z' fill='url(%23g)' opacity='.96'/><path d='M28 12c-9 2-15 10-14 19 1 5 4 9 8 12 4 3 9 4 13 7 4 3 6 8 5 13 4-3 6-8 5-13-1-6-6-9-11-12-4-2-7-4-8-8-2-7 1-13 6-18 2-2 4-3 6-4-3 1-6 2-10 4Z' fill='%23c084fc' opacity='.9'/><path d='M36 24c5 1 9 5 9 10s-4 9-9 10c-5 1-10-2-12-7-1-4 0-8 3-10 2-2 5-3 9-3Z' fill='%234b1369' opacity='.35'/><path d='M37 27c3 1 5 4 5 7s-2 6-5 7c-3 1-7 0-9-3-2-3-2-6 0-8 2-3 5-4 9-3Z' fill='none' stroke='%23ffffff' stroke-width='2.8' stroke-linecap='round' opacity='.85'/></svg>");}
    .portal-glyph-red{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><radialGradient id='g' cx='50%25' cy='50%25' r='50%25'><stop offset='0%25' stop-color='%23ffffff'/><stop offset='18%25' stop-color='%23fee2e2'/><stop offset='36%25' stop-color='%23fca5a5'/><stop offset='62%25' stop-color='%23f87171'/><stop offset='100%25' stop-color='%23ef4444'/></radialGradient></defs><path d='M33 6c9 1 17 8 18 17 1 6-1 11-5 15-3 3-7 5-10 8-4 3-5 8-3 12-5-2-8-7-7-12 1-6 6-8 10-11 4-2 7-5 8-10 1-7-4-14-11-19Z' fill='url(%23g)' opacity='.96'/><path d='M28 12c-9 2-15 10-14 19 1 5 4 9 8 12 4 3 9 4 13 7 4 3 6 8 5 13 4-3 6-8 5-13-1-6-6-9-11-12-4-2-7-4-8-8-2-7 1-13 6-18 2-2 4-3 6-4-3 1-6 2-10 4Z' fill='%23fb7185' opacity='.88'/><path d='M36 24c5 1 9 5 9 10s-4 9-9 10c-5 1-10-2-12-7-1-4 0-8 3-10 2-2 5-3 9-3Z' fill='%237f1d1d' opacity='.33'/><path d='M37 27c3 1 5 4 5 7s-2 6-5 7c-3 1-7 0-9-3-2-3-2-6 0-8 2-3 5-4 9-3Z' fill='none' stroke='%23ffffff' stroke-width='2.8' stroke-linecap='round' opacity='.85'/></svg>");}
    .symbol-portal{display:inline-flex;align-items:center;justify-content:center;transform:none;font-size:0;font-weight:900;}
    .symbol-portal-blue,.symbol-portal-purple,.symbol-portal-red{color:transparent;text-shadow:none;}
    .mapEditorCell.portal{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.10);}
    .mapEditorCell.portal-blue{background:rgba(255,255,255,.05);border-color:rgba(49,208,255,.30);}
    .mapEditorCell.portal-purple{background:rgba(255,255,255,.05);border-color:rgba(168,85,247,.30);}
    .mapEditorCell.portal-red{background:rgba(255,255,255,.05);border-color:rgba(248,113,113,.30);}


    @media (max-width: 980px){.teacherTopGrid{grid-template-columns:1fr;}.teacherCompactGrid{grid-template-columns:1fr;}.teacherInlineRow{grid-template-columns:1fr;}.teacherTopActions{justify-content:flex-start;}}
    @media (max-width: 900px){.editorTwoCol{grid-template-columns:1fr;}}
  </style>

</head>

<body class="teacher-backstage-page">
  <div class="container teacherShell">
    <div class="header teacherHeader">
      <div class="brand teacherBrand">
        <div class="logo"></div>
        <div>
          <h1>教師後台</h1>
          <p>班級進度、關卡管理</p>
        </div>
      </div>
      <div class="teacherTopActions">
        <div class="badge" id="sessionBadge">教師未登入</div>
        <button id="btnTeacherLogout">登出</button>
        <button id="btnBack">回首頁</button>
      </div>
    </div>

    <div class="teacherHiddenAuth" aria-hidden="true">
      <input id="teacherCode" type="hidden" value="" inputmode="numeric" />
      <button id="btnTeacherLogin" type="button" tabindex="-1">登入</button>
    </div>

    <div class="teacherToastLine" id="toast"></div>

    <div class="card teacherCompactCard" id="teacherToolsCard" style="margin-top:14px; display:none;">
      <div class="teacherCardHead">
        <div class="teacherCardTitleRow">
          <h2>教師模式快捷工具</h2>
          <span class="badge teacherAutoSyncBadge" id="teacherAutoSyncBadge">成績自動更新：每 5 秒</span>
        </div>
        <button type="button" class="teacherCollapseBtn" id="btnToggleTeacherTools" aria-expanded="true">最小化 ▲</button>
      </div>

      <div class="teacherToolsBody" id="teacherToolsBody">
      <div class="teacherToolsGrid teacherToolsGridCompact">
        <div>
          <label>世界選擇</label>
          <select id="teacherWorld"></select>
        </div>
        <div>
          <label>關卡選擇</label>
          <select id="teacherLevel"></select>
        </div>
      </div>

      <div class="btnbar teacherActionBar" style="margin-top:12px; flex-wrap:wrap;">
        <button id="btnOpenBoss">前往關卡</button>
        <button class="primary" id="btnSaveBest">儲存最佳解法</button>
        <button id="btnLoadBest">載入最佳解法</button>
        <button class="danger" id="btnClearBest">同步最佳程式碼數</button>
        <button id="btnExportBestCode">匯出到 levels.js</button>
      </div>

      <div class="editorSection teacherEditorSection">
        <h3 style="margin:0 0 10px 0;">關卡編輯模式</h3>

        <div class="btnbar teacherActionBar" style="margin-bottom:12px; flex-wrap:wrap;">
          <button id="btnLoadLevelData">載入目前關卡資料</button>
          <button class="primary" id="btnSaveLevelEdit">儲存關卡修改</button>
          <button id="btnPreviewLevelEdit">前往此關預覽</button>
          <button id="btnExportLevelJson">匯出此關 JSON</button>
          <button class="danger" id="btnClearLevelEdit">清除此關修改</button>
        </div>

        <div class="editorTwoCol">
          <div>
            <label>點格子工具</label>
            <div class="mapPalette" id="mapPalette"></div>

            <div class="mapHintBox small">
              目前筆刷：<b id="currentPaintLabel">牆壁 #</b>
            </div>

            <label style="margin-top:12px;">地圖編輯區</label>
            <div class="mapEditorWrap">
              <div id="mapEditorGrid" class="mapEditorGrid"></div>
            </div>
          </div>

          <div>
            <div class="teacherToolsGrid">
              <div>
                <label>關卡名稱</label>
                <input id="editLevelName" placeholder="例如：第1關：學院走廊" />
              </div>
              <div>
                <label>最佳程式碼數</label>
                <input id="editTargetBlocks" type="number" min="1" />
              </div>
              <div>
                <label>地圖大小</label>
                <input id="editMapSize" type="number" min="1" />
              </div>
              <div>
                <label>起始方向（0上 1右 2下 3左）</label>
                <select id="editStartDir"></select>
              </div>
              <div>
                <label>道具獎勵</label>
                <select id="editItemReward"></select>
              </div>
              <div>
                <label>裝備獎勵</label>
                <select id="editEquipmentReward"></select>
              </div>
            </div>

#.#.#.#.#

#########"></textarea>
