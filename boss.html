<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Boss 戰｜森林狼王</title>
  <style>
    :root{
      --bg:#dfe8dc;
      --panel:#f7faf5;
      --line:#c8d5c5;
      --text:#1f3526;
      --muted:#5e7664;
      --green1:#69b76d;
      --green2:#4ea95c;
      --red1:#f18773;
      --red2:#dc5844;
      --blue1:#92b8ff;
      --blue2:#668dee;
      --orange1:#f7d9a6;
      --orange2:#ebc881;
      --shadow:0 12px 24px rgba(31,53,38,.08);
      --radius:22px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;background:url('img/world1_bg_boss_magic_hall.png') center/cover no-repeat fixed;color:var(--text);font-family:"Noto Sans TC",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:10px}
    .page{
      width:min(calc((100vh - 20px) * 16 / 9), calc(100vw - 20px));
      aspect-ratio:16 / 9;
      margin:0 auto;
      padding:12px;
      display:grid;
      grid-template-rows:auto minmax(0,1fr) auto;
      gap:10px;
    }
    .top-actions{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:nowrap;min-height:0}
    .title-wrap{min-width:0;padding:8px 12px;border-radius:16px;background:rgba(12,22,46,.52);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(5px);box-shadow:0 8px 18px rgba(0,0,0,.16)}
    .title-wrap h1{margin:0;font-size:clamp(18px,1.7vw,24px);line-height:1.08;color:#f8fbff;text-shadow:0 2px 8px rgba(0,0,0,.28)}
    .title-wrap p{display:none}
    .toolbar{display:flex;gap:8px;flex-wrap:nowrap;flex-shrink:0}
    .toolbar button{border:none;border-radius:14px;padding:10px 15px;font-size:clamp(13px,.95vw,16px);font-weight:900;cursor:pointer;box-shadow:var(--shadow)}
    .toolbar .ghost{background:#fff;color:#36533f;border:1px solid var(--line)}
    .toolbar .warn{background:#fff4f1;color:#9f4336;border:1px solid #efc2ba}
    .stage{
      min-height:0;
      display:grid;
      background:transparent;
      border:none;
      border-radius:var(--radius);
      padding:4px 6px 6px;
      grid-template-rows:auto minmax(320px,1fr) auto;
      gap:8px;
      overflow:visible;
    }
    .stage-top{
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(280px,420px) minmax(0,1fr);
      gap:12px;
      align-items:stretch;
      min-height:0;
      position:relative;
      z-index:3;
    }
    .panel,.intent-box,.result-card{background:rgba(247,250,245,.96);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .arena{border-radius:var(--radius);}
    .stage-bottom{display:grid;grid-template-columns:1.7fr .9fr;gap:8px;min-height:0;background:transparent}
    .card-box,.action-box{padding:10px;min-height:0;background:rgba(247,250,245,.96);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:var(--radius)}
    .panel,.intent-box{padding:8px 12px}
    .hp-capsule{
      padding:8px 14px;
      border-radius:18px;
      background:rgba(247,250,245,.95);
      border:1px solid var(--line);
      box-shadow:0 6px 14px rgba(31,53,38,.06);
    }
    .panel-title{font-size:clamp(11px,.82vw,13px);font-weight:900;color:#57705d;margin-bottom:6px}
    .hp-head{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
    .hp-head strong{font-size:clamp(14px,.98vw,17px)}
    .hp-num{font-size:clamp(15px,1vw,17px);font-weight:900}
    .hp-bar{margin-top:6px;height:11px;border-radius:999px;background:#e5ece3;overflow:hidden}
    .fill-player,.fill-boss{height:100%;border-radius:999px;transition:width .25s ease}
    .fill-player{background:linear-gradient(90deg,var(--green1),var(--green2))}
    .fill-boss{background:linear-gradient(90deg,var(--red1),var(--red2))}
    .panel-sub{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:6px;color:#425a48;font-weight:900;font-size:clamp(11px,.8vw,13px)}
    .intent-box{text-align:center;background:linear-gradient(180deg,#fff7ea,#f5ead6);border-color:#e5cf9d;display:flex;flex-direction:column;justify-content:center}
    .intent-title{font-size:clamp(12px,.92vw,14px);font-weight:900;color:#7c5d22}
    .intent-main{margin-top:4px;font-size:clamp(24px,2vw,34px);font-weight:900;color:#633d18;line-height:1.15}
    .intent-sub{margin-top:6px;font-size:clamp(12px,.92vw,14px);line-height:1.45;color:#7a6340}
    .arena{
      min-height:0;
      min-height:380px;
      margin-top:0;
      padding:10px 10px 0;
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(260px,420px) minmax(0,1fr);
      align-items:end;
      gap:10px;
      position:relative;
      overflow:visible;
      z-index:1;
      background:transparent !important;
      border:none;
      box-shadow:none;
    }
    .arena::after{
      content:"";
      position:absolute;
      left:22%;
      right:22%;
      bottom:10px;
      height:34px;
      background:radial-gradient(circle,rgba(40,66,47,.18),rgba(40,66,47,0));
      filter:blur(5px);
    }
    .portrait{
      position:relative;
      z-index:2;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-end;
      width:100%;
      height:100%;
      padding:18px 0 6px;
    }
    .portrait img{
      display:block;
      width:auto;
      height:100%;
      max-width:min(100%,520px);
      max-height:100%;
      object-fit:contain;
      object-position:center bottom;
      transform:scale(1.08);
      transform-origin:center bottom;
      filter:drop-shadow(0 12px 22px rgba(0,0,0,.18));
    }
    .boss-floating-name{
      display:none !important;
    }
    .phase-badge{padding:8px 16px;border-radius:999px;background:linear-gradient(180deg,#fee8bf,#f7d58c);font-weight:900;font-size:clamp(14px,1vw,18px);color:#7a5b17;border:1px solid #e5c67f;box-shadow:0 8px 18px rgba(120,91,23,.12)}
    .fx-box{display:none !important}
    .arena-center{display:flex;align-items:center;justify-content:center;height:100%;padding-bottom:46px;}
    .battle-banner{width:100%;padding:18px 20px;border-radius:24px;background:rgba(12,22,46,.58);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(6px);box-shadow:0 10px 24px rgba(0,0,0,.18);text-align:center;}
    .battle-banner-label{font-size:clamp(12px,.9vw,14px);font-weight:900;color:#e9f2ff;letter-spacing:.08em;}
    .battle-banner-main{margin-top:8px;font-size:clamp(28px,2.4vw,42px);line-height:1.12;font-weight:900;color:#fff7ea;text-shadow:0 3px 10px rgba(0,0,0,.28);min-height:2.3em;display:flex;align-items:center;justify-content:center;}
    .battle-banner-sub{margin-top:8px;font-size:clamp(12px,.92vw,14px);line-height:1.5;color:#eef6ff;min-height:2.8em;}
    .portrait-caption{display:none !important}
    .portrait.player-portrait img{max-height:300px;}
    .portrait.boss-portrait img{max-height:330px;}

    .section-title{font-size:clamp(15px,1vw,17px);font-weight:900;margin-bottom:6px;color:#1f3526}
    .cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;align-items:stretch}
    .boss-card{min-height:0}
    .boss-icon-btn,.action-icon-btn{
      width:100%;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
      border-radius:18px;padding:8px 6px;background:linear-gradient(180deg,#fffefd 0%,#f2f8ef 100%);border:1px solid #d8e3d6;min-height:118px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.7),0 8px 18px rgba(57,100,70,.08);transition:transform .15s ease,filter .15s ease,opacity .15s ease;
    }
    .boss-icon-btn:hover,.action-icon-btn:hover{transform:translateY(-1px);filter:brightness(1.02)}
    .boss-icon-btn:disabled,.action-icon-btn:disabled{cursor:not-allowed;opacity:.58;transform:none;filter:grayscale(.15)}
    .boss-icon-art,.action-icon-art{
      display:flex;align-items:center;justify-content:center;border-radius:16px;background:radial-gradient(circle at top,#ffffff 0%,#f0f4ee 78%);
      border:1px solid #e4ebe2;overflow:hidden;
    }
    .boss-icon-art{width:min(100%,104px);aspect-ratio:1/1;padding:4px}
    .boss-icon-art img{width:92px;height:92px;object-fit:contain;display:block;transform:scale(1.08);transform-origin:center center;filter:drop-shadow(0 8px 14px rgba(0,0,0,.14));}
    .action-icon-art{width:72px;height:72px;font-size:34px;font-weight:900;color:#355441}
    .boss-icon-label,.action-icon-label{font-size:clamp(12px,.86vw,14px);font-weight:900;line-height:1.15;text-align:center;color:#1f3526}
    .boss-icon-state,.action-icon-hint{font-size:11px;line-height:1.2;text-align:center;font-weight:800;color:#5e7664}
    .boss-icon-btn.is-used .boss-icon-state{color:#8b4b4b}
    .boss-icon-btn.is-locked .boss-icon-state{color:#6f6581}
    .action-buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .action-icon-btn.primary{background:linear-gradient(180deg,#f6fff6,#e7f7e8)}
    .action-icon-btn.secondary{background:linear-gradient(180deg,#f4f8ff,#e7efff)}
    .action-icon-btn.utility{background:linear-gradient(180deg,#f6fbf1,#e5f1df)}
    .action-icon-btn.danger{background:linear-gradient(180deg,#fff6f4,#ffe8e3)}
    .action-icon-btn.primary .action-icon-art{color:#2d7b38}
    .action-icon-btn.secondary .action-icon-art{color:#436dce}
    .action-icon-btn.utility .action-icon-art{color:#527d3f}
    .action-icon-btn.danger .action-icon-art{color:#c8513f}
    .boss-action-modal{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(8,14,28,.42);backdrop-filter:blur(5px)}
    .boss-action-modal[hidden]{display:none !important}
    .boss-action-card{width:min(420px,100%);padding:18px;border-radius:24px;background:rgba(247,250,245,.98);border:1px solid var(--line);box-shadow:0 18px 36px rgba(0,0,0,.22);color:var(--text)}
    .boss-action-head{display:flex;align-items:center;gap:12px}
    .boss-action-preview{width:86px;height:86px;border-radius:20px;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at top,#ffffff 0%,#f0f4ee 78%);border:1px solid #e4ebe2;overflow:hidden;font-size:40px;font-weight:900;color:#355441;flex:0 0 auto}
    .boss-action-preview img{width:76px;height:76px;object-fit:contain;display:block;filter:drop-shadow(0 8px 14px rgba(0,0,0,.14));}
    .boss-action-title{margin:0;font-size:22px;line-height:1.15;color:#1f3526}
    .boss-action-state{margin-top:6px;display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;background:#edf4eb;font-size:12px;font-weight:900;color:#4a654f}
    .boss-action-desc{margin-top:14px;font-size:15px;line-height:1.65;color:#355441;font-weight:700}
    .boss-action-note{margin-top:12px;padding:12px 14px;border-radius:16px;background:#f5f8ff;border:1px solid #dbe4ff;font-size:13px;line-height:1.6;font-weight:800;color:#35508c}
    .boss-action-buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
    .boss-action-buttons button{border:none;border-radius:14px;padding:12px 14px;font-size:14px;font-weight:900;cursor:pointer}
    .boss-action-cancel{background:#eef2f8;color:#355441}
    .boss-action-confirm{background:linear-gradient(180deg,var(--green1),var(--green2));color:#fff}
    .boss-action-confirm.danger{background:linear-gradient(180deg,var(--red1),var(--red2))}
    button[disabled]{opacity:.45;cursor:not-allowed}
    .footer-tip{margin-top:6px;color:#24392c;font-weight:800;line-height:1.45;font-size:clamp(11px,.78vw,12px)}
    .inline-log{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
    .boss-log-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;border-radius:999px;background:#edf4eb;color:#21352a;font-size:clamp(10px,.74vw,12px);font-weight:900;border:1px solid #d7e3d5}
    .boss-turn-box{
      margin-bottom:8px;
      padding:10px 12px;
      border-radius:16px;
      background:linear-gradient(180deg,#fff7ea,#f5ead6);
      border:1px solid #e5cf9d;
    }
    .boss-turn-label{font-size:clamp(11px,.82vw,13px);font-weight:900;color:#7c5d22;margin-bottom:4px}
    .boss-turn-name{font-size:clamp(22px,1.55vw,28px);font-weight:900;color:#633d18;line-height:1.12}
    .boss-turn-hint{margin-top:4px;font-size:clamp(11px,.78vw,12px);line-height:1.4;color:#5b472b;font-weight:800}
    .result-card{
      position:fixed;
      inset:0;
      z-index:9999;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:rgba(20,35,24,.38);
      backdrop-filter:blur(3px);
    }
    .result-card[hidden]{display:none !important}
    .result-inner{
      width:min(680px, calc(100vw - 28px));
      border:2px solid var(--line);
      border-radius:28px;
      box-shadow:0 20px 50px rgba(0,0,0,.22);
      padding:24px 22px 20px;
      background:linear-gradient(180deg,#ffffff 0%,#f5faf3 100%);
      text-align:center;
    }
    .result-card h3{margin:0 0 8px;font-size:clamp(24px,2vw,34px)}
    .result-card p{margin:0;color:#38523f;line-height:1.7;font-weight:700;font-size:clamp(15px,1vw,18px)}
    .result-card.good .result-inner{border-color:#b9d8bb;background:linear-gradient(180deg,#fbfffb 0%,#eef9ee 100%)}
    .result-card.bad .result-inner{border-color:#efc2ba;background:linear-gradient(180deg,#fffdfc 0%,#fff2ef 100%)}
    .result-badges{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:14px}
    .result-badges span{padding:8px 12px;border-radius:999px;background:#fff;border:1px solid #d9e4d6;font-weight:900;font-size:clamp(12px,.84vw,14px)}
    .result-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:16px;
    }
    .result-actions button{
      border:none;
      border-radius:16px;
      padding:13px 14px;
      font-size:clamp(14px,.95vw,16px);
      font-weight:900;
      cursor:pointer;
      box-shadow:0 8px 18px rgba(57,100,70,.12);
    }
    .result-actions .next{background:linear-gradient(180deg,var(--green1),var(--green2));color:#fff}
    .result-actions .retry{background:linear-gradient(180deg,var(--blue1),var(--blue2));color:#fff}
    .result-actions .back{background:#fff;color:#36533f;border:1px solid var(--line)}
    .result-actions.single{grid-template-columns:1fr}
    @media (max-width: 1100px) and (orientation: landscape){
      body{padding:8px}
      .page{width:min(100vw - 16px, 1500px);aspect-ratio:16 / 9;min-height:0;padding:10px;gap:8px}
      .top-actions{gap:10px}
      .title-wrap{padding:8px 10px}
      .toolbar button{padding:9px 12px}
      .stage{padding:6px;gap:8px;grid-template-rows:auto minmax(320px,1fr) auto}
      .stage-top{grid-template-columns:minmax(0,1fr) minmax(220px,320px) minmax(0,1fr);gap:8px}
      .stage-bottom{grid-template-columns:1.45fr .95fr;gap:8px}
      .arena{
        min-height:320px;
        margin-top:0;
        padding:8px 8px 0;
        grid-template-columns:minmax(0,1fr) minmax(220px,320px) minmax(0,1fr);
        gap:8px;
        overflow:visible;
      }
      .portrait{padding:12px 0 4px;transform:translateY(0)}
      .portrait img{max-height:100%;transform:scale(1.04)}
      .portrait.player-portrait img{max-height:250px}
      .portrait.boss-portrait img{max-height:280px}
      .arena-center{padding-bottom:32px}
      .battle-banner{padding:16px 18px}
      .cards{grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}
      .boss-icon-btn,.action-icon-btn{min-height:100px;padding:7px 5px}
      .boss-icon-art{width:min(100%,88px)}
      .boss-icon-art img{width:78px;height:78px}
      .action-icon-art{width:64px;height:64px;font-size:30px}
      .boss-floating-name{display:none !important}
    }
    @media (max-width: 900px){
      body{padding:8px}
      .page{width:min(100vw - 16px, 1500px);aspect-ratio:auto;min-height:calc(100vh - 16px)}
      .stage-top,.stage-bottom{grid-template-columns:1fr}
      .cards{grid-template-columns:repeat(2,minmax(0,1fr))}
      .boss-action-card{padding:16px}
      .arena{
        min-height:300px;
        margin-top:0;
        padding-top:52px;
        overflow:hidden;
      }
      .portrait{
        padding-bottom:8px;
        transform:translateY(0);
      }
      .portrait img{
        max-height:100%;
        transform:scale(1.22);
      }
      .boss-floating-name{
        display:none !important;
      }
    }
    @media (max-width: 640px){
      body{display:block;padding:0}
      .page{width:100%;aspect-ratio:auto;min-height:100vh;padding:14px 12px 22px}
      .top-actions{flex-wrap:wrap}
      .toolbar{width:100%;flex-wrap:wrap}
      .toolbar button{flex:1}
      .cards,.result-actions{grid-template-columns:1fr 1fr}
      .action-buttons{grid-template-columns:1fr 1fr}
      .boss-action-buttons{grid-template-columns:1fr}
      .panel,.intent-box,.card-box,.action-box{border-radius:20px}
      .result-inner{border-radius:22px;padding:20px 16px 16px}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-actions">
      <div class="title-wrap">
        <h1 id="pageTitle">Boss 戰：森林狼王</h1>
        <p id="pageIntro">完全獨立頁模式。若挑戰失敗會回到首頁，請先補齊未達三星關卡的神秘道具再回來挑戰。</p>
      </div>
      <div class="toolbar">
        <button class="ghost" id="btnBackGame">回首頁</button>
        <button class="ghost" id="btnRetry">重新挑戰</button>
        <button class="warn" id="btnExit">離開關卡</button>
      </div>
    </div>

    <section class="stage">
      <div class="stage-top">
        <div class="panel hp-capsule">
          <div class="panel-title">玩家狀態</div>
          <div class="hp-head"><strong id="playerName">勇者 HP</strong><span class="hp-num" id="playerHpText">30 / 30</span></div>
          <div class="hp-bar"><div class="fill-player" id="playerHpBar" style="width:100%"></div></div>
          <div class="panel-sub"><span>護盾：<b id="playerShield">0</b></span><span>蓄力：<b id="playerPower">0</b></span></div>
          <div class="panel-sub" id="playerHintText" style="margin-top:4px;">攻擊 0%｜閃避 0%</div>
        </div>

        <div class="intent-box">
          <div class="intent-title" id="turnText">第 1 回合｜狼王下一招</div>
          <div class="intent-main" id="intentMain">🩸 利爪攻擊</div>
          <div class="intent-sub" id="intentSub">普通攻擊。</div>
        </div>

        <div class="panel hp-capsule">
          <div class="panel-title">Boss 狀態</div>
          <div class="hp-head"><strong id="bossName">森林狼王</strong><span class="hp-num" id="bossHpText">26 / 26</span></div>
          <div class="hp-bar"><div class="fill-boss" id="bossHpBar" style="width:100%"></div></div>
          <div class="panel-sub"><span>階段：<b id="bossPhase">森林試探</b></span><span>冰凍：<b id="bossFreeze">0</b></span></div>
          <div class="panel-sub" id="bossHintText" style="margin-top:4px;">爆擊 0%｜閃避 0%</div>
        </div>
      </div>

      <div class="arena">
        <div class="boss-floating-name" id="topBossBadge">BOSS</div>
        <div class="portrait player-portrait">
          <img id="playerImg" alt="玩家角色">
          <div class="portrait-caption" id="playerPortraitLabel">玩家</div>
        </div>
        <div class="arena-center">
          <div class="battle-banner">
            <div class="battle-banner-label">本回合戰況</div>
            <div class="battle-banner-main" id="fxText">⚔️ Boss 戰開始！</div>
            <div class="battle-banner-sub" id="fxSubText">先觀察敵人的下一招，再決定要攻擊、防禦或使用道具。</div>
          </div>
        </div>
        <div class="portrait boss-portrait">
          <img id="bossImg" alt="森林狼王">
          <div class="portrait-caption" id="bossPortraitLabel">Boss</div>
        </div>
      </div>

      <div class="stage-bottom">
        <div class="card-box">
          <div class="section-title">卡牌區</div>
          <div class="cards" id="bossCards"></div>
        </div>

        <div class="action-box">
          <div class="section-title">玩家行動</div>
          <div class="action-buttons" id="bossActions"></div>
          <div class="inline-log" id="battleLog"></div>
        </div>
      </div>
    </section>

    <section class="result-card" id="resultCard" hidden aria-live="polite"></section>
  </div>

  <div class="boss-action-modal" id="bossActionModal" hidden aria-hidden="true">
    <div class="boss-action-card" role="dialog" aria-modal="true" aria-labelledby="bossActionTitle">
      <div class="boss-action-head">
        <div class="boss-action-preview" id="bossActionPreview">⚔️</div>
        <div>
          <h3 class="boss-action-title" id="bossActionTitle">動作說明</h3>
          <div class="boss-action-state" id="bossActionState">準備中</div>
        </div>
      </div>
      <div class="boss-action-desc" id="bossActionDesc">請確認後再執行。</div>
      <div class="boss-action-note" id="bossActionNote">點擊確認後才會真正出招，避免 iPad 誤觸。</div>
      <div class="boss-action-buttons">
        <button type="button" class="boss-action-cancel" id="bossActionCancel">返回</button>
        <button type="button" class="boss-action-confirm" id="bossActionConfirm">確認使用</button>
      </div>
    </div>
  </div>

  <script src="storage.js"></script>
  <script src="boss.js"></script>
</body>
</html>
