<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>魔法迷宮｜登入與選關</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="levels.js"></script>
  <script src="storage.js"></script>
  <script src="auth.js"></script>
  <style>
    #worldList .level-grid{
      margin-top:10px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    #worldList .boss-btn{
      grid-column:1 / -1;
      background:linear-gradient(180deg,#ffd34d 0%,#f0b90b 100%);
      color:#3f2c00;
      border:1px solid rgba(167,122,0,.28);
      box-shadow:0 8px 18px rgba(240,185,11,.22);
      font-weight:900;
    }
    #worldList .boss-btn.locked{
      opacity:.7;
      filter:grayscale(.08);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>魔法迷宮｜積木程式逃出迷宮</h1>
          <p>用積木寫程式，讓角色逃出迷宮，收集道具解鎖新世界 ✨</p>
        </div>
      </div>
      <div class="badge" id="sessionBadge">尚未登入</div>
    </div>

    <div class="row">
      <div class="stack">
        <div class="card">
          <h2 style="margin:0 0 10px 0;">學生登入</h2>
          <label>五碼學號（前三碼班級＋後兩碼座號，例如 30105）</label>
          <input id="studentId" placeholder="30105" inputmode="numeric" maxlength="5" />

          <div class="btnbar">
            <button class="primary" id="btnStudentLogin">登入並選關</button>
            <button id="btnLogout">登出</button>
          </div>

          <div class="small" style="margin-top:8px;">
            教師測試帳號：teacher.html（教師碼：<b>1070</b>）
          </div>

          <div class="hr"></div>

          <div class="btnbar">
            <button id="btnTeacher">進入教師後台</button>
            <button id="btnClassRank">更新本班總分排行榜</button>
          </div>

          <div class="toast" id="toast"></div>
        </div>

        <div class="card">
          <h2 style="margin:0 0 10px 0;">本班排行榜（總分：所有已通關關卡的最佳分數加總）</h2>
          <div id="rankArea" class="small">請先以學生登入後再查看。</div>
        </div>
      </div>

      <div class="card">
        <h2 style="margin:0 0 10px 0;">世界與關卡</h2>
        <div id="worldList"></div>
        <div class="small" style="margin-top:10px;">
          小提醒：先用「向前走」與「左/右轉」，進階再用「重複」減少積木數量。
        </div>
      </div>
    </div>
  </div>

<script>
  const HOME_WORLD_NAME = {
    W1: '世界1｜魔法學院（序列）',
    W2: '世界2｜符文森林（迴圈）',
    W3: '世界3｜時光圖書館（條件式）',
    W4: '世界4｜機械城堡（函式）'
  };

  const HOME_BOSS_LABEL = {
    W1: '🧙‍🏫 第5關：教授 Boss 戰',
    W2: '🐺 第5關：狼王 Boss 戰',
    W3: '📚 第5關：館長 Boss 戰',
    W4: '🤖 第5關：機械主宰 Boss 戰'
  };

  const WORLD_THEME = {
    W1: {
      cardBg: 'linear-gradient(180deg,#f3f4f6 0%,#e5e7eb 100%)',
      border: '1px solid rgba(148,163,184,.45)',
      shadow: '0 10px 24px rgba(100,116,139,.16)',
      title: '#1f2937',
      text: '#374151',
      badgeBg: 'rgba(255,255,255,.7)',
      badgeBd: 'rgba(148,163,184,.45)'
    },
    W2: {
      cardBg: 'linear-gradient(180deg,#e8f7ea 0%,#d8f0dc 100%)',
      border: '1px solid rgba(34,197,94,.28)',
      shadow: '0 10px 24px rgba(34,197,94,.12)',
      title: '#14532d',
      text: '#166534',
      badgeBg: 'rgba(255,255,255,.72)',
      badgeBd: 'rgba(34,197,94,.30)'
    },
    W3: {
      cardBg: 'linear-gradient(180deg,#fff7dd 0%,#ffefbf 100%)',
      border: '1px solid rgba(245,158,11,.28)',
      shadow: '0 10px 24px rgba(245,158,11,.14)',
      title: '#78350f',
      text: '#92400e',
      badgeBg: 'rgba(255,255,255,.76)',
      badgeBd: 'rgba(245,158,11,.30)'
    },
    W4: {
      cardBg: 'linear-gradient(180deg,#e8f3ff 0%,#d8e9ff 100%)',
      border: '1px solid rgba(59,130,246,.28)',
      shadow: '0 10px 24px rgba(59,130,246,.14)',
      title: '#1e3a8a',
      text: '#1d4ed8',
      badgeBg: 'rgba(255,255,255,.76)',
      badgeBd: 'rgba(59,130,246,.30)'
    }
  };

  const toast = (msg)=> document.getElementById('toast').textContent = msg;

  function renderSession(){
    const s = StorageAPI.getSession();
    const el = document.getElementById('sessionBadge');
    if(!s){
      el.textContent = '尚未登入';
      return null;
    }
    if(s.role === 'student'){
      el.textContent = `學生：${s.userId}`;
    }else{
      el.textContent = '教師模式';
    }
    return s;
  }

  function getWorldUnlocked(world, progress, userId){
    const rule = world.unlockRule;
    if(!rule) return true;
    if(rule.type === 'always') return true;
    if(rule.type === 'passCountInWorld'){
      const need = Number(rule.need || 0);
      const w = rule.worldId;
      const best = progress[userId]?.best || {};
      const passed = Object.keys(best).filter(k => k.startsWith(w + '-')).length;
      return passed >= need;
    }
    return false;
  }

  function normalizeWorldId(worldId){
    const raw = String(worldId || '').trim();
    if(!raw) return '';
    const m = raw.match(/^world\s*(\d+)$/i);
    if(m) return `W${m[1]}`;
    return raw.toUpperCase();
  }

  function normalizeLevelId(levelId){
    const raw = String(levelId || '').trim();
    if(!raw) return '';
    if(/^boss$/i.test(raw)) return 'BOSS';
    const m = raw.match(/^level\s*(\d+)$/i);
    if(m) return `L${m[1]}`;
    return raw.toUpperCase();
  }

  function getBestRecord(progress, userId, worldId, levelId){
    const best = progress[userId]?.best || {};
    const targetWorld = normalizeWorldId(worldId);
    const targetLevel = normalizeLevelId(levelId);
    const foundKey = Object.keys(best).find(key => {
      const [w, l] = String(key).split('-');
      return normalizeWorldId(w) === targetWorld && normalizeLevelId(l) === targetLevel;
    });
    return foundKey ? best[foundKey] : null;
  }

  function getDisplayWorldName(world){
    const worldId = normalizeWorldId(world.worldId);
    return HOME_WORLD_NAME[worldId] || world.worldName || world.worldId;
  }

  function getHomeNormalLevels(world){
    const levels = Array.isArray(world.levels) ? world.levels.slice(0, 4) : [];
    while(levels.length < 4){
      const n = levels.length + 1;
      levels.push({
        levelId: `L${n}`,
        name: `第${n}關：敬請期待`,
        placeholder: true
      });
    }
    return levels;
  }

  function isBossUnlocked(progress, userId, world){
    if(!userId) return false;
    const normalLevels = getHomeNormalLevels(world);
    return normalLevels.every(lv => !!getBestRecord(progress, userId, world.worldId, lv.levelId));
  }

  function buildBossButtonLabel(world){
    const worldId = normalizeWorldId(world.worldId);
    return HOME_BOSS_LABEL[worldId] || '👑 第5關：Boss 戰';
  }

  function renderWorlds(){
    const s = StorageAPI.getSession();
    const isTeacher = (s?.role === 'teacher');
    const progress = StorageAPI.getProgress();
    const userId = s?.role === 'student' ? s.userId : null;

    const wrap = document.getElementById('worldList');
    wrap.innerHTML = '';

    LEVELS.forEach(world => {
      const worldUnlocked = isTeacher ? true : (userId ? getWorldUnlocked(world, progress, userId) : false);
      const normalLevels = getHomeNormalLevels(world);
      const bossUnlocked = isTeacher ? true : (worldUnlocked && userId && isBossUnlocked(progress, userId, world));

      const worldId = normalizeWorldId(world.worldId);
      const theme = WORLD_THEME[worldId] || WORLD_THEME.W1;

      const wCard = document.createElement('div');
      wCard.className = 'card';
      wCard.style.marginBottom = '10px';
      wCard.style.padding = '12px';
      wCard.style.background = theme.cardBg;
      wCard.style.border = theme.border;
      wCard.style.boxShadow = theme.shadow;

      const title = document.createElement('div');
      title.style.display = 'flex';
      title.style.justifyContent = 'space-between';
      title.style.alignItems = 'center';
      title.innerHTML = `<div style="color:${theme.title};"><b>${getDisplayWorldName(world)}</b></div>
                         <div class="badge" style="background:${theme.badgeBg};border:${theme.badgeBd};color:${theme.title};">${isTeacher ? '教師可進入' : (worldUnlocked ? '已解鎖' : '未解鎖')}</div>`;
      wCard.appendChild(title);

      const list = document.createElement('div');
      list.className = 'level-grid';

      normalLevels.forEach((lv, idx) => {
        const best = userId ? getBestRecord(progress, userId, world.worldId, lv.levelId) : null;
        const prevLv = normalLevels[idx - 1];
        const prevBest = (userId && prevLv) ? getBestRecord(progress, userId, world.worldId, prevLv.levelId) : null;
        const levelUnlocked = isTeacher ? true : (idx === 0 ? true : !!prevBest);
        const canPlay = isTeacher ? true : !!(worldUnlocked && userId && levelUnlocked);

        const btn = document.createElement('button');
        btn.classList.add('level-btn');
        btn.disabled = !canPlay;

        if(!canPlay){
          btn.classList.add('locked');
        }else if(!isTeacher && best){
          const starCount = Number(best.stars || 0);
          if(starCount >= 3){
            btn.classList.add('star3');
          }else if(starCount >= 2){
            btn.classList.add('star2');
          }else{
            btn.classList.add('star1');
          }
        }

        btn.textContent = isTeacher ? `👩‍🏫 ${lv.name}` : lv.name;
        if(!isTeacher && best){
          btn.textContent = `${lv.name}｜★${best.stars} 分${best.score}`;
        }

        btn.onclick = ()=>{
          if(!canPlay) return;
          location.href = `game.html?world=${encodeURIComponent(world.worldId)}&level=${encodeURIComponent(lv.levelId)}`;
        };

        list.appendChild(btn);
      });

      if(isTeacher || bossUnlocked){
        const bossBtn = document.createElement('button');
        bossBtn.classList.add('level-btn', 'boss-btn');
        bossBtn.textContent = buildBossButtonLabel(world);
        bossBtn.onclick = ()=>{
          location.href = `boss.html?world=${encodeURIComponent(world.worldId)}&level=boss`;
        };
        list.appendChild(bossBtn);
      }

      wCard.appendChild(list);

      const hint = document.createElement('div');
      hint.className = 'small';
      hint.style.marginTop = '8px';
      hint.style.color = theme.text;
      hint.textContent = isTeacher
        ? '教師模式：可直接進入前四個一般關，並可看到第5關 Boss 預留按鈕。'
        : (!userId
            ? '請先登入才能選關。'
            : (!worldUnlocked
                ? '先完成前面世界的指定關數才能解鎖。'
                : (bossUnlocked
                    ? '已完成前四個一般關，現在已出現第5關 Boss 按鈕。'
                    : '本世界共有 4 個一般關，全部完成後才會顯示第5關 Boss 按鈕。')));
      wCard.appendChild(hint);

      wrap.appendChild(wCard);
    });
  }

  function renderClassRank(){
    const s = StorageAPI.getSession();
    const area = document.getElementById('rankArea');
    if(!s || s.role !== 'student'){
      area.textContent = '請先以學生登入後再查看。';
      return;
    }

    const progress = StorageAPI.getProgress();
    const classId = s.classId;
    const uids = Object.keys(progress)
      .filter(uid => uid !== 'teacher')
      .filter(uid => uid.slice(0,3) === classId);

    if(uids.length === 0){
      area.textContent = '目前尚無排行榜資料。';
      return;
    }

    const rows = uids.map(uid => {
      const best = progress[uid]?.best || {};
      const passed = Object.keys(best).length;
      const total = Object.keys(best).reduce((sum, key) => sum + (Number(best[key]?.score) || 0), 0);
      return {
        uid,
        seat: uid.slice(3,5),
        passed,
        total
      };
    }).sort((a,b)=> b.total - a.total || b.passed - a.passed || a.seat.localeCompare(b.seat));

    area.innerHTML = '';

    const table = document.createElement('table');
    table.className = 'table';
    table.innerHTML = `
      <thead><tr>
        <th>名次</th><th>座號</th><th>通關數</th><th>總分</th>
      </tr></thead>
      <tbody>
        ${rows.slice(0, 30).map((r, i) => `
          <tr>
            <td>${i + 1}</td>
            <td>${r.seat}</td>
            <td>${r.passed}</td>
            <td>${r.total}</td>
          </tr>
        `).join('')}
      </tbody>
    `;
    area.appendChild(table);

    const small = document.createElement('div');
    small.className = 'small';
    small.style.marginTop = '10px';
    small.textContent = '說明：總分＝每一關最佳分數加總。';
    area.appendChild(small);
  }

  document.getElementById('btnStudentLogin').onclick = ()=>{
    const studentId = document.getElementById('studentId').value.trim();
    if(!/^\d{5}$/.test(studentId)){
      toast('學號請輸入 5 位數，例如 30105');
      return;
    }

    const s = Auth.loginStudent({ studentId });
    if(!s){
      toast('登入失敗：學號格式錯誤');
      return;
    }

    toast('登入成功！請選關開始。');
    renderSession();
    renderWorlds();
    renderClassRank();
  };

  document.getElementById('btnLogout').onclick = ()=>{
    Auth.logout();
    toast('已登出。');
    renderSession();
    renderWorlds();
    renderClassRank();
  };

  document.getElementById('btnTeacher').onclick = ()=>{
    location.href = 'teacher.html';
  };

  document.getElementById('btnClassRank').onclick = ()=>{
    renderClassRank();
    toast('已更新本班排行榜（總分）。');
  };

  renderSession();
  renderWorlds();
  renderClassRank();
</script>
</body>
</html>
