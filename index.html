<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>程式迷宮大冒險｜首頁登入</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="levels.js"></script>
  <script src="storage.js"></script>
  <script src="auth.js"></script>
  <style>
    :root{
      --home-panel-bg:rgba(10,16,28,.52);
      --home-panel-line:rgba(255,255,255,.16);
      --home-gold:#f7d27a;
      --home-gold-2:#eab84c;
      --home-text:#f8f4ea;
      --home-muted:rgba(248,244,234,.78);
      --home-shadow:0 20px 50px rgba(0,0,0,.38);
    }

    html,body{
      width:100%;
      min-height:100%;
    }

    body.home-page{
      margin:0;
      color:var(--home-text);
      background:
        linear-gradient(180deg, rgba(7,10,18,.16) 0%, rgba(7,10,18,.34) 100%),
        url('img/index.jpeg') center center / cover no-repeat fixed;
      overflow-x:hidden;
    }

    .home-shell{
      min-height:100vh;
      position:relative;
      padding:18px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:18px;
    }

    .home-topbar,
    .home-brand,
    .home-status{
      display:none !important;
    }

    .home-start-wrap{
      position:absolute;
      left:50%;
      bottom:32px;
      transform:translateX(-50%);
      z-index:3;
      display:flex;
      justify-content:center;
      width:min(100%, 360px);
      pointer-events:none;
    }

    .home-start-btn{
      pointer-events:auto;
      min-width:280px;
      min-height:78px;
      padding:18px 34px;
      border-radius:26px;
      border:3px solid rgba(255,226,150,.88);
      background:linear-gradient(180deg,#7a4a1a 0%, #5b3210 100%);
      color:#fff7e6;
      font-size:26px;
      font-weight:900;
      letter-spacing:.08em;
      box-shadow:0 18px 32px rgba(0,0,0,.34), inset 0 2px 0 rgba(255,255,255,.14);
      text-shadow:0 2px 6px rgba(0,0,0,.28);
    }

    .home-start-btn:hover{
      transform:translateY(-2px);
      filter:brightness(1.04);
    }

    .home-start-btn:active{
      transform:translateY(0);
    }

    .home-stage{
      flex:1;
      min-height:300px;
      position:relative;
      z-index:1;
      cursor:pointer;
    }


    .home-panels{
      position:relative;
      z-index:2;
      display:grid;
      grid-template-columns:minmax(0,1fr);
      gap:16px;
      align-items:start;
    }

    .home-panels[hidden]{display:none !important;}

    body.home-page.student-logged-in .home-start-wrap{display:none !important;}

    .home-card{
      background:var(--home-panel-bg);
      border:1px solid var(--home-panel-line);
      border-radius:24px;
      box-shadow:var(--home-shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      padding:16px;
      color:var(--home-text);
    }

    .home-worlds-card,
    .home-rank-card{
      width:100%;
    }

    .home-worlds-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:14px;
      align-items:stretch;
    }

    .home-card h2{
      margin:0 0 12px;
      font-size:22px;
      color:#fff0c8;
    }

    .home-card .small{ color:var(--home-muted); }

    #worldList{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:14px;
    }

    #worldList .home-world-card{
      height:100%;
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-bottom:0 !important;
    }

    #worldList .level-grid{
      margin-top:0;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    #worldList .boss-btn{
      grid-column:1 / -1;
      background:linear-gradient(180deg,#ffd34d 0%,#f0b90b 100%);
      color:#3f2c00;
      border:1px solid rgba(167,122,0,.28);
      box-shadow:0 8px 18px rgba(240,185,11,.22);
      font-weight:900;
    }
    #worldList .boss-btn.locked{
      opacity:.7;
      filter:grayscale(.08);
    }

    .home-modal-mask{
      position:fixed;
      inset:0;
      background:rgba(5,8,14,.6);
      backdrop-filter:blur(6px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:20;
    }

    .home-modal-mask[hidden]{display:none !important;}

    .home-modal{
      width:min(760px, 100%);
      max-height:min(92vh, 920px);
      overflow:auto;
      border-radius:28px;
      background:linear-gradient(180deg, rgba(30,20,12,.94) 0%, rgba(17,22,34,.96) 100%);
      border:1px solid rgba(255,231,173,.24);
      box-shadow:0 28px 60px rgba(0,0,0,.5);
      color:var(--home-text);
      padding:22px;
    }

    .home-modal-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:14px;
    }

    .home-modal-head h3{
      margin:0;
      font-size:28px;
      color:#fff1c7;
    }

    .home-modal-head p{
      margin:6px 0 0;
      color:var(--home-muted);
      line-height:1.6;
    }

    .home-close{
      width:44px;
      height:44px;
      border-radius:14px;
      font-size:22px;
      font-weight:900;
      padding:0;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      color:#fff;
    }

    .home-login-tabs{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:14px;
    }

    .home-tab{
      padding:12px 14px;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      color:var(--home-text);
      font-weight:900;
      text-align:center;
    }

    .home-tab.active{
      background:linear-gradient(180deg, rgba(255,220,136,.22) 0%, rgba(145,97,32,.22) 100%);
      border-color:rgba(255,214,120,.58);
      box-shadow:0 0 0 2px rgba(255,214,120,.14) inset;
    }

    .login-panel[hidden]{display:none !important;}

    .login-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      align-items:start;
    }

    .login-box{
      padding:16px;
      border-radius:20px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1);
    }

    .login-box h4{
      margin:0 0 10px;
      font-size:18px;
      color:#fff1c7;
    }

    .login-box label{
      color:var(--home-muted);
      font-size:13px;
      margin:8px 0 6px;
    }

    .login-box input{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.26);
      color:#fff;
      font-size:16px;
      outline:none;
    }

    .login-box input:focus{
      border-color:rgba(255,214,120,.58);
      box-shadow:0 0 0 3px rgba(255,214,120,.12);
    }

    .character-picker{margin-top:12px;}
    .character-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}
    .character-option{position:relative;border:2px solid rgba(255,255,255,.10);border-radius:16px;padding:10px;background:rgba(255,255,255,.04);cursor:pointer;transition:.2s ease;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;}
    .character-option:hover{transform:translateY(-1px);border-color:rgba(255,214,120,.45);}
    .character-option.active{border-color:#ffd678;background:rgba(255,214,120,.12);box-shadow:0 0 0 3px rgba(255,214,120,.12) inset;}
    .character-option img{width:110px;height:110px;object-fit:contain;display:block;border-radius:14px;background:rgba(255,255,255,.06);padding:6px;}
    .character-option .character-name{font-weight:900;color:var(--home-text);}
    .character-option .character-desc{font-size:12px;color:var(--home-muted);line-height:1.4;}

    .home-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .home-actions button,
    .login-box button{
      min-height:46px;
      padding:12px 16px;
      border-radius:14px;
      font-size:15px;
      font-weight:900;
    }

    .home-primary-btn{
      background:linear-gradient(180deg,#ffd677 0%,#d79a38 100%) !important;
      color:#3d2508 !important;
      border:1px solid rgba(143,88,25,.38) !important;
    }

    .home-toast{
      min-height:24px;
      margin-top:8px;
      font-size:14px;
      font-weight:800;
      color:#ffe39a;
    }

    .home-sub-actions{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-top:12px;
      flex-wrap:wrap;
    }

    .home-helper{
      color:var(--home-muted);
      font-size:13px;
      line-height:1.6;
    }

    .home-logout-row{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-bottom:10px;
    }

    .home-empty{
      padding:14px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px dashed rgba(255,255,255,.14);
      color:var(--home-muted);
    }

    .table{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
      border-radius:14px;
      background:rgba(255,255,255,.04);
    }

    .table th,.table td{
      padding:10px 8px;
      text-align:center;
      border-bottom:1px solid rgba(255,255,255,.08);
      color:var(--home-text);
    }

    .table thead th{
      background:rgba(255,255,255,.08);
      color:#fff0c8;
    }

    .class-progress-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .class-progress-sub{
      color:var(--home-muted);
      font-size:13px;
      line-height:1.6;
    }

    .class-progress-legend{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:10px 0 12px;
    }

    .class-legend-item{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      font-size:12px;
      color:var(--home-text);
    }

    .class-dot{
      width:12px;
      height:12px;
      border-radius:4px;
      border:1px solid rgba(255,255,255,.16);
      display:inline-block;
    }
    .class-dot.none{background:rgba(255,255,255,.08);}
    .class-dot.one{background:#86efac;}
    .class-dot.two{background:#22c55e;}
    .class-dot.three{background:#fbbf24;}
    .class-dot.boss{background:#ef4444;}

    .class-progress-wrap{
      overflow:auto;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(7,12,28,.16);
    }

    .class-progress-board{
      width:max-content;
      min-width:100%;
      border-collapse:separate;
      border-spacing:0;
    }

    .class-progress-board th,
    .class-progress-board td{
      border-right:1px solid rgba(255,255,255,.08);
      border-bottom:1px solid rgba(255,255,255,.08);
      padding:0;
      text-align:center;
      vertical-align:middle;
    }

    .class-progress-board thead th{
      position:sticky;
      top:0;
      z-index:2;
      background:#17203f;
    }

    .class-progress-board .student-col{
      position:sticky;
      left:0;
      z-index:1;
      min-width:132px;
      max-width:132px;
      background:#111a33;
      text-align:left;
    }

    .class-progress-board thead .student-col{
      z-index:3;
      background:#1a2347;
    }

    .class-progress-board .total-col{
      min-width:84px;
      background:#0f1730;
      font-weight:900;
      color:#fff0c8;
    }

    .class-progress-board .world-head{
      font-size:13px;
      font-weight:900;
      color:#fff;
      padding:12px 8px;
    }

    .class-progress-board .level-head{
      min-width:44px;
      padding:8px 4px;
      font-size:11px;
      line-height:1.2;
      color:#dbe5ff;
      background:#162142;
    }

    .class-progress-board .student-meta{
      padding:8px 10px;
      display:flex;
      flex-direction:column;
      gap:3px;
    }

    .class-progress-board .student-name{
      font-weight:900;
      color:#fff;
      font-size:13px;
      line-height:1.15;
    }

    .class-progress-board .student-sub{
      font-size:11px;
      color:var(--home-muted);
      line-height:1.25;
    }

    .class-progress-board .status-cell{
      width:44px;
      height:42px;
      position:relative;
    }

    .class-progress-board .status-btn{
      width:100%;
      height:100%;
      border:none;
      border-radius:0;
      background:transparent;
      color:#fff;
      font-weight:900;
      font-size:11px;
      padding:0;
      min-height:0;
    }

    .class-progress-board .status-btn:hover{transform:none;filter:brightness(1.08);}
    .class-progress-board .status-btn.none{background:rgba(255,255,255,.04);color:#7d89b8;}
    .class-progress-board .status-btn.one{background:#86efac;color:#14532d;}
    .class-progress-board .status-btn.two{background:#22c55e;color:#0b1b10;}
    .class-progress-board .status-btn.three{background:#fbbf24;color:#2b1b00;}
    .class-progress-board .status-btn.boss{background:#dc2626;color:#fff;}
    .class-progress-board .cell-main{display:block;font-size:13px;line-height:1;}
    .class-progress-board .cell-sub{display:block;font-size:9px;opacity:.92;margin-top:2px;}
    .class-progress-board .world-W1{background:#334155 !important;}
    .class-progress-board .world-W2{background:#065f46 !important;}
    .class-progress-board .world-W3{background:#92400e !important;}
    .class-progress-board .world-W4{background:#1d4ed8 !important;}
    .home-current-student .student-col{box-shadow:inset 4px 0 0 #ffd677;}

    @media (max-width: 980px){
      .home-worlds-grid,
      #worldList,
      .login-grid{grid-template-columns:1fr;}
      .home-shell{padding:14px;}
      .home-brand{max-width:100%;}
      .home-modal{padding:18px;}
    }

    @media (max-width: 640px){
      .home-modal-head h3{font-size:24px;}
      .character-option img{width:84px;height:84px;}
      #worldList .level-grid{grid-template-columns:1fr;}
      .home-login-tabs{grid-template-columns:1fr;}
      .home-start-wrap{bottom:20px;width:min(100%, 300px);}
      .home-start-btn{min-width:220px;min-height:64px;padding:14px 24px;font-size:22px;border-radius:22px;}
    }
  </style>
</head>
<body class="home-page">
  <div class="home-shell">
    <div class="home-status" id="sessionBadge" hidden>尚未登入</div>

    <div class="home-stage" id="homeStage" tabindex="0" aria-label="點擊開啟登入視窗">
      <div class="home-start-wrap">
        <button type="button" class="home-start-btn" id="btnStartGame">開始遊戲</button>
      </div>
    </div>

    <div class="home-panels" id="homePanels" hidden>
      <div class="home-card home-worlds-card">
        <div class="home-logout-row">
          <button id="btnLogout">登出</button>
          <button id="btnReopenLogin">切換登入</button>
        </div>
        <h2>世界與關卡</h2>
        <div id="worldList"></div>
      </div>

      <div class="home-card home-rank-card">
        <div class="class-progress-head">
          <div>
            <h2 style="margin-bottom:0;">本班闖關總覽</h2>
          </div>
          <button id="btnClassRank">更新本班進度</button>
        </div>
        <div class="class-progress-legend">
          <span class="class-legend-item"><span class="class-dot none"></span>未通關</span>
          <span class="class-legend-item"><span class="class-dot one"></span>1 星</span>
          <span class="class-legend-item"><span class="class-dot two"></span>2 星</span>
          <span class="class-legend-item"><span class="class-dot three"></span>3 星</span>
          <span class="class-legend-item"><span class="class-dot boss"></span>Boss</span>
        </div>
        <div id="rankArea" class="small">請先以學生登入後再查看。</div>
      </div>
    </div>
  </div>

  <div class="home-modal-mask" id="loginModal" hidden>
    <div class="home-modal" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
      <div class="home-modal-head">
        <div>
          <h3 id="loginTitle">登入冒險大廳</h3>
          <p>學生可輸入五碼班級座號並選擇角色，教師可輸入預設密碼進入教師視窗。</p>
        </div>
        <button class="home-close" id="btnCloseLogin" aria-label="關閉登入視窗">×</button>
      </div>

      <div class="home-login-tabs">
        <button type="button" class="home-tab active" id="tabStudent">學生登入</button>
        <button type="button" class="home-tab" id="tabTeacher">教師登入</button>
      </div>

      <div class="login-panel" id="studentPanel">
        <div class="login-grid">
          <div class="login-box">
            <h4>學生登入</h4>
            <label for="studentId">班級座號五碼數字</label>
            <input id="studentId" placeholder="例如 30105" inputmode="numeric" maxlength="5" />

            <div class="character-picker">
              <label>選擇角色</label>
              <div class="character-grid" id="characterGrid">
                <button type="button" class="character-option active" data-character="boy">
                  <img src="img/boy.png" alt="男角色">
                  <div class="character-name">冒險少年</div>
                  <div class="character-desc">劍士造型，適合勇者冒險感。</div>
                </button>
                <button type="button" class="character-option" data-character="girl">
                  <img src="img/girl.png" alt="女角色">
                  <div class="character-name">精靈法師</div>
                  <div class="character-desc">法杖造型，適合法術冒險感。</div>
                </button>
              </div>
              <input type="hidden" id="selectedCharacter" value="boy" />
            </div>

            <div class="home-actions">
              <button class="home-primary-btn" id="btnStudentLogin">登入並選關</button>
            </div>
            <div class="home-toast" id="toast"></div>
          </div>

          <div class="login-box">
            <h4>操作說明</h4>
            <div class="home-helper">
              1. 輸入前三碼班級＋後兩碼座號。<br>
              2. 選擇男角色或女角色。<br>
              3. 登入成功後，下方會出現世界與關卡。<br>
              4. 點選關卡後即可進入遊戲。
            </div>
          </div>
        </div>
      </div>

      <div class="login-panel" id="teacherPanel" hidden>
        <div class="login-grid">
          <div class="login-box">
            <h4>教師登入</h4>
            <label for="teacherCode">教師密碼</label>
            <input id="teacherCode" type="password" placeholder="請輸入教師密碼" />
            <div class="home-actions">
              <button class="home-primary-btn" id="btnTeacherLogin">登入教師視窗</button>
            </div>
            <div class="home-toast" id="teacherToast"></div>
          </div>

          <div class="login-box">
            <h4>教師功能</h4>
            <div class="home-helper">
              教師登入後會進入教師後台，可查看全班成績、管理關卡、開啟教師工具與編輯地圖。<br><br>
              預設教師密碼：<b>1070</b>
            </div>
          </div>
        </div>
      </div>

      <div class="home-sub-actions">
        <div class="home-helper">登入視窗風格已與首頁背景一致，可直接作為首頁使用。</div>
      </div>
    </div>
  </div>

<script>
  const HOME_WORLD_NAME = {
    W1: '世界1｜魔法學院（序列）',
    W2: '世界2｜符文森林（迴圈）',
    W3: '世界3｜時光圖書館（條件式）',
    W4: '世界4｜機械城堡（函式）'
  };

  const HOME_BOSS_LABEL = {
    W1: '🧙‍🏫 第5關：教授 Boss 戰',
    W2: '🐺 第5關：狼王 Boss 戰',
    W3: '📚 第5關：館長 Boss 戰',
    W4: '🤖 第5關：機械主宰 Boss 戰'
  };

  const WORLD_THEME = {
    W1: {
      cardBg: 'linear-gradient(180deg,#f3f4f6 0%,#e5e7eb 100%)',
      border: '1px solid rgba(148,163,184,.45)',
      shadow: '0 10px 24px rgba(100,116,139,.16)',
      title: '#1f2937',
      text: '#374151',
      badgeBg: 'rgba(255,255,255,.7)',
      badgeBd: 'rgba(148,163,184,.45)'
    },
    W2: {
      cardBg: 'linear-gradient(180deg,#e8f7ea 0%,#d8f0dc 100%)',
      border: '1px solid rgba(34,197,94,.28)',
      shadow: '0 10px 24px rgba(34,197,94,.12)',
      title: '#14532d',
      text: '#166534',
      badgeBg: 'rgba(255,255,255,.72)',
      badgeBd: 'rgba(34,197,94,.30)'
    },
    W3: {
      cardBg: 'linear-gradient(180deg,#fff7dd 0%,#ffefbf 100%)',
      border: '1px solid rgba(245,158,11,.28)',
      shadow: '0 10px 24px rgba(245,158,11,.14)',
      title: '#78350f',
      text: '#92400e',
      badgeBg: 'rgba(255,255,255,.76)',
      badgeBd: 'rgba(245,158,11,.30)'
    },
    W4: {
      cardBg: 'linear-gradient(180deg,#e8f3ff 0%,#d8e9ff 100%)',
      border: '1px solid rgba(59,130,246,.28)',
      shadow: '0 10px 24px rgba(59,130,246,.14)',
      title: '#1e3a8a',
      text: '#1d4ed8',
      badgeBg: 'rgba(255,255,255,.76)',
      badgeBd: 'rgba(59,130,246,.30)'
    }
  };

  const toast = (msg)=> document.getElementById('toast').textContent = msg || '';
  const teacherToast = (msg)=> document.getElementById('teacherToast').textContent = msg || '';

  function openLoginModal(defaultTab = 'student'){
    document.getElementById('loginModal').hidden = false;
    switchLoginTab(defaultTab);
    if(defaultTab === 'teacher'){
      document.getElementById('teacherCode').focus();
    }else{
      document.getElementById('studentId').focus();
    }
  }

  function closeLoginModal(){
    document.getElementById('loginModal').hidden = true;
  }

  function switchLoginTab(tab){
    const isTeacher = tab === 'teacher';
    document.getElementById('tabStudent').classList.toggle('active', !isTeacher);
    document.getElementById('tabTeacher').classList.toggle('active', isTeacher);
    document.getElementById('studentPanel').hidden = isTeacher;
    document.getElementById('teacherPanel').hidden = !isTeacher;
  }

  function bindCharacterPicker(){
    const hidden = document.getElementById('selectedCharacter');
    document.querySelectorAll('.character-option').forEach(btn => {
      btn.addEventListener('click', ()=>{
        const value = btn.dataset.character || 'boy';
        if(hidden) hidden.value = value;
        document.querySelectorAll('.character-option').forEach(node => node.classList.toggle('active', node === btn));
      });
    });
  }

  function renderSession(){
    const s = StorageAPI.getSession();
    const panels = document.getElementById('homePanels');
    document.body.classList.toggle('student-logged-in', !!s && s.role === 'student');

    if(!s){
      panels.hidden = true;
      return null;
    }

    if(s.role === 'student'){
      panels.hidden = false;
    }else{
      panels.hidden = true;
    }
    return s;
  }

  function getWorldUnlocked(world, progress, userId){
    const rule = world.unlockRule;
    if(!rule) return true;
    if(rule.type === 'always') return true;
    if(rule.type === 'passCountInWorld'){
      const need = Number(rule.need || 0);
      const w = rule.worldId;
      const best = progress[userId]?.best || {};
      const passed = Object.keys(best).filter(k => k.startsWith(w + '-')).length;
      return passed >= need;
    }
    return false;
  }

  function normalizeWorldId(worldId){
    const raw = String(worldId || '').trim();
    if(!raw) return '';
    const m = raw.match(/^world\s*(\d+)$/i);
    if(m) return `W${m[1]}`;
    return raw.toUpperCase();
  }

  function normalizeLevelId(levelId){
    const raw = String(levelId || '').trim();
    if(!raw) return '';
    if(/^boss$/i.test(raw)) return 'BOSS';
    const m = raw.match(/^level\s*(\d+)$/i);
    if(m) return `L${m[1]}`;
    return raw.toUpperCase();
  }

  function getBestRecord(progress, userId, worldId, levelId){
    const best = progress[userId]?.best || {};
    const targetWorld = normalizeWorldId(worldId);
    const targetLevel = normalizeLevelId(levelId);
    const foundKey = Object.keys(best).find(key => {
      const [w, l] = String(key).split('-');
      return normalizeWorldId(w) === targetWorld && normalizeLevelId(l) === targetLevel;
    });
    return foundKey ? best[foundKey] : null;
  }

  function getDisplayWorldName(world){
    const worldId = normalizeWorldId(world.worldId);
    return HOME_WORLD_NAME[worldId] || world.worldName || world.worldId;
  }

  function getHomeNormalLevels(world){
    const levels = Array.isArray(world.levels) ? world.levels.slice(0, 4) : [];
    while(levels.length < 4){
      const n = levels.length + 1;
      levels.push({
        levelId: `L${n}`,
        name: `第${n}關：敬請期待`,
        placeholder: true
      });
    }
    return levels;
  }

  function isBossUnlocked(progress, userId, world){
    if(!userId) return false;
    const normalLevels = getHomeNormalLevels(world);
    return normalLevels.every(lv => !!getBestRecord(progress, userId, world.worldId, lv.levelId));
  }

  function buildBossButtonLabel(world){
    const worldId = normalizeWorldId(world.worldId);
    return HOME_BOSS_LABEL[worldId] || '👑 第5關：Boss 戰';
  }

  function renderWorlds(){
    const s = StorageAPI.getSession();
    const isTeacher = (s?.role === 'teacher');
    const progress = StorageAPI.getProgress();
    const userId = s?.role === 'student' ? s.userId : null;

    const wrap = document.getElementById('worldList');
    wrap.innerHTML = '';

    if(!s || (!isTeacher && !userId)){
      wrap.innerHTML = '<div class="home-empty">請先登入學生帳號後再選關。</div>';
      return;
    }

    LEVELS.forEach(world => {
      const worldUnlocked = isTeacher ? true : (userId ? getWorldUnlocked(world, progress, userId) : false);
      const normalLevels = getHomeNormalLevels(world);
      const bossUnlocked = isTeacher ? true : (worldUnlocked && userId && isBossUnlocked(progress, userId, world));

      const worldId = normalizeWorldId(world.worldId);
      const theme = WORLD_THEME[worldId] || WORLD_THEME.W1;

      const wCard = document.createElement('div');
      wCard.className = 'card home-world-card';
      wCard.style.marginBottom = '10px';
      wCard.style.padding = '12px';
      wCard.style.background = theme.cardBg;
      wCard.style.border = theme.border;
      wCard.style.boxShadow = theme.shadow;

      const title = document.createElement('div');
      title.style.display = 'flex';
      title.style.justifyContent = 'space-between';
      title.style.alignItems = 'center';
      title.style.gap = '8px';
      title.innerHTML = `<div style="color:${theme.title};"><b>${getDisplayWorldName(world)}</b></div>
                         <div class="badge" style="background:${theme.badgeBg};border:${theme.badgeBd};color:${theme.title};">${isTeacher ? '教師可進入' : (worldUnlocked ? '已解鎖' : '未解鎖')}</div>`;
      wCard.appendChild(title);

      const list = document.createElement('div');
      list.className = 'level-grid';

      normalLevels.forEach((lv, idx) => {
        const best = userId ? getBestRecord(progress, userId, world.worldId, lv.levelId) : null;
        const prevLv = normalLevels[idx - 1];
        const prevBest = (userId && prevLv) ? getBestRecord(progress, userId, world.worldId, prevLv.levelId) : null;
        const levelUnlocked = isTeacher ? true : (idx === 0 ? true : !!prevBest);
        const canPlay = isTeacher ? true : !!(worldUnlocked && userId && levelUnlocked);

        const btn = document.createElement('button');
        btn.classList.add('level-btn');
        btn.disabled = !canPlay;

        if(!canPlay){
          btn.classList.add('locked');
        }else if(!isTeacher && best){
          const starCount = Number(best.stars || 0);
          if(starCount >= 3){
            btn.classList.add('star3');
          }else if(starCount >= 2){
            btn.classList.add('star2');
          }else{
            btn.classList.add('star1');
          }
        }

        btn.textContent = isTeacher ? `👩‍🏫 ${lv.name}` : lv.name;
        if(!isTeacher && best){
          btn.textContent = `${lv.name}｜★${best.stars} 分${best.score}`;
        }

        btn.onclick = ()=>{
          if(!canPlay) return;
          location.href = `game.html?world=${encodeURIComponent(world.worldId)}&level=${encodeURIComponent(lv.levelId)}`;
        };

        list.appendChild(btn);
      });

      if(isTeacher || bossUnlocked){
        const bossBtn = document.createElement('button');
        bossBtn.classList.add('level-btn', 'boss-btn');
        bossBtn.textContent = buildBossButtonLabel(world);
        bossBtn.onclick = ()=>{
          location.href = `boss.html?world=${encodeURIComponent(world.worldId)}&level=boss`;
        };
        list.appendChild(bossBtn);
      }

      wCard.appendChild(list);


      wrap.appendChild(wCard);
    });
  }

  function getAllDisplayLevels(){
    return LEVELS.flatMap(world => {
      const worldId = normalizeWorldId(world.worldId);
      const normalLevels = getHomeNormalLevels(world).map(level => ({
        worldId,
        levelId: normalizeLevelId(level.levelId),
        label: String(level.levelId || '').replace(/^L/i, 'L'),
        isBoss: false
      }));
      return normalLevels;
    });
  }

  function getNormalizedBestMap(bestObj){
    const out = {};
    Object.entries(bestObj || {}).forEach(([key, record]) => {
      const [worldId, levelId] = String(key).split('-');
      out[`${normalizeWorldId(worldId)}-${normalizeLevelId(levelId)}`] = record;
    });
    return out;
  }

  function calcTotalScore(bestObj){
    return Object.values(bestObj || {}).reduce((sum, record) => sum + (Number(record?.score) || 0), 0);
  }

  function getRecordStatus(record, isBoss = false){
    if(!record){
      return { statusClass:'none', main:'－', sub:'', title:'尚未通關' };
    }
    const stars = Number(record.stars || 0);
    const score = Number(record.score || 0);
    const steps = Number(record.steps || 0);
    const timeMs = Number(record.timeMs || 0);
    let statusClass = 'one';
    if(isBoss){
      statusClass = 'boss';
    }else if(stars >= 3){
      statusClass = 'three';
    }else if(stars === 2){
      statusClass = 'two';
    }
    return {
      statusClass,
      main: isBoss ? 'B' : `${Math.max(stars, 1)}★`,
      sub: score > 0 ? String(score) : '',
      title: `星數：${stars || 0}｜分數：${score || 0}｜步數：${steps || 0}${timeMs > 0 ? `｜${(timeMs / 1000).toFixed(1)}秒` : ''}`
    };
  }

  function renderClassRank(){
    const s = StorageAPI.getSession();
    const area = document.getElementById('rankArea');
    if(!s || s.role !== 'student'){
      area.innerHTML = '<div class="home-empty">請先以學生登入後再查看本班闖關總覽。</div>';
      return;
    }

    const progress = StorageAPI.getProgress();
    const classId = s.classId;
    const displayLevels = getAllDisplayLevels();
    const classStudents = Object.keys(progress)
      .filter(uid => uid !== 'teacher')
      .filter(uid => /^\d{5}$/.test(uid))
      .filter(uid => uid.slice(0,3) === classId)
      .map(uid => {
        const best = getNormalizedBestMap(progress[uid]?.best || {});
        return {
          uid,
          seat: uid.slice(3,5),
          best,
          total: calcTotalScore(best),
          passed: Object.keys(best).length
        };
      })
      .sort((a,b)=> b.total - a.total || b.passed - a.passed || a.seat.localeCompare(b.seat));

    if(classStudents.length === 0){
      area.innerHTML = '<div class="home-empty">目前這個班級還沒有闖關紀錄。</div>';
      return;
    }

    const worldGroups = LEVELS.map(world => ({
      worldId: normalizeWorldId(world.worldId),
      worldName: getDisplayWorldName(world),
      count: getHomeNormalLevels(world).length
    }));

    const headerTop = worldGroups.map(group => `<th class="world-head world-${group.worldId}" colspan="${group.count}">${group.worldName}</th>`).join('');
    const headerBottom = LEVELS.flatMap(world => getHomeNormalLevels(world).map((level, idx) => `<th class="level-head">L${idx + 1}</th>`)).join('');

    const tableRows = classStudents.map(stu => {
      const isCurrent = stu.uid === s.userId;
      const cells = displayLevels.map(meta => {
        const record = stu.best[`${meta.worldId}-${meta.levelId}`];
        const status = getRecordStatus(record, meta.isBoss);
        return `
          <td class="status-cell" title="${status.title}">
            <button type="button" class="status-btn ${status.statusClass}" disabled>
              <span class="cell-main">${status.main}</span>
              <span class="cell-sub">${status.sub}</span>
            </button>
          </td>`;
      }).join('');

      return `
        <tr class="${isCurrent ? 'home-current-student' : ''}">
          <td class="student-col">
            <div class="student-meta">
              <div class="student-name">${classId}-${stu.seat}${isCurrent ? '（目前）' : ''}</div>
              <div class="student-sub">通關 ${stu.passed} 關｜總分 ${stu.total}</div>
            </div>
          </td>
          ${cells}
          <td class="total-col">${stu.total}</td>
        </tr>`;
    }).join('');

    area.innerHTML = `
      <div class="class-progress-wrap">
        <table class="class-progress-board">
          <thead>
            <tr>
              <th class="student-col" rowspan="2">學生</th>
              ${headerTop}
              <th class="total-col" rowspan="2">總分</th>
            </tr>
            <tr>${headerBottom}</tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    `;
  }

  function handleStudentLogin(){
    const studentId = document.getElementById('studentId').value.trim();
    if(!/^\d{5}$/.test(studentId)){
      toast('學號請輸入 5 位數，例如 30105');
      return;
    }

    const character = document.getElementById('selectedCharacter')?.value || 'boy';
    const s = Auth.loginStudent({ studentId, character });
    if(!s){
      toast('登入失敗：學號格式錯誤');
      return;
    }

    toast('登入成功！請選關開始。');
    renderSession();
    renderWorlds();
    renderClassRank();
    closeLoginModal();
  }

  function handleTeacherLogin(){
    const teacherCode = document.getElementById('teacherCode').value.trim();
    const s = Auth.loginTeacher({ teacherCode });
    if(!s){
      teacherToast('教師密碼錯誤，請重新輸入。');
      return;
    }
    teacherToast('登入成功，正在前往教師視窗…');
    location.href = 'teacher.html';
  }

  const homeStage = document.getElementById('homeStage');
  const btnStartGame = document.getElementById('btnStartGame');
  homeStage.onclick = ()=> openLoginModal('student');
  if(btnStartGame){
    btnStartGame.onclick = (e)=>{
      e.stopPropagation();
      openLoginModal('student');
    };
  }
  homeStage.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      openLoginModal('student');
    }
  });
  document.getElementById('btnReopenLogin').onclick = ()=> openLoginModal('student');
  document.getElementById('btnCloseLogin').onclick = closeLoginModal;
  document.getElementById('tabStudent').onclick = ()=> switchLoginTab('student');
  document.getElementById('tabTeacher').onclick = ()=> switchLoginTab('teacher');
  document.getElementById('btnStudentLogin').onclick = handleStudentLogin;
  document.getElementById('btnTeacherLogin').onclick = handleTeacherLogin;
  document.getElementById('btnClassRank').onclick = ()=>{
    renderClassRank();
    toast('已更新本班闖關總覽。');
  };

  document.getElementById('btnLogout').onclick = ()=>{
    Auth.logout();
    toast('已登出。');
    teacherToast('');
    document.getElementById('teacherCode').value = '';
    renderSession();
    renderWorlds();
    renderClassRank();
  };

  document.getElementById('studentId').addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') handleStudentLogin();
  });
  document.getElementById('teacherCode').addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') handleTeacherLogin();
  });
  document.getElementById('loginModal').addEventListener('click', (e)=>{
    if(e.target.id === 'loginModal') closeLoginModal();
  });

  bindCharacterPicker();
  renderSession();
  renderWorlds();
  renderClassRank();
</script>
</body>
</html>
