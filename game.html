<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <title>魔法迷宮｜遊戲</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- Blockly CDN（主程式 + 繁中語系） -->
  <script src="https://unpkg.com/blockly/blockly.min.js"></script>
  <script src="https://unpkg.com/blockly/msg/zh-hant.js"></script>

  <script src="levels.js"></script>
  <script src="storage.js"></script>
  <script src="auth.js"></script>
  <script src="blockly_setup.js"></script>
  <script src="game.js"></script>
  <script src="teacher_mode_patch.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1 id="title">遊戲中...</h1>
          <p id="subtitle">用積木控制角色前進、轉向，先拿鑰匙，再走到出口門</p>
        </div>
      </div>
      <div class="badge" id="sessionBadge"></div>
    </div>

    <div class="gameLayout">
      <div class="card stage">
        <div class="stageTop">
          <div class="kpi">
            <span class="badge">步數：<strong id="steps">0</strong></span>
            <span class="badge">撞牆：<strong id="bumps">0</strong></span>
            <span class="badge">鑰匙：<strong id="hasKey">否</strong></span>
          </div>
          <div class="btnbar" style="margin:0;">
            <button class="primary" id="btnRun">▶ 執行</button>
            <button id="btnStep">⏭ 步進</button>
            <button id="btnPause">⏸ 暫停</button>
            <button id="btnReset">↩ 重來</button>
            <button class="danger" id="btnExit">⛔ 結束</button>
          </div>
        </div>

        <div class="stageMiddle">
          <div class="gridWrap" id="gridWrap">
            <div id="grid" class="grid"></div>
          </div>
          <div class="mazeResultWrap" id="mazeResultWrap" hidden></div>
        </div>

        <div class="stageFooter mergedFooter">
          <div class="footerBox">
            <div class="footerMain">
              <div class="footerToast" id="toast"></div>
              <div class="footerInfo infoPanel legendTicker" id="info" aria-live="polite"></div>
              <div class="footerResult small" id="result"></div>
            </div>
            <div class="footerZoomBar" aria-label="迷宮大小調整">
              <span class="footerZoomLabel">迷宮大小</span>
              <button id="btnZoomOut" title="縮小迷宮" aria-label="縮小迷宮">－</button>
              <button id="btnZoomReset" title="恢復預設大小" aria-label="恢復迷宮大小">◎</button>
              <button id="btnZoomIn" title="放大迷宮" aria-label="放大迷宮">＋</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card editorCard">
        <h2 class="editorTitle">積木程式區</h2>
        <div class="blocklyWrap">
          <div id="blocklyDiv"></div>
        </div>
        <div class="small editorHint">
          小提醒：先用「向前走」與「左/右轉」，進階再用「重複」減少積木數量。
        </div>
      </div>
    </div>
  </div>

<script>
  // ✅ 啟用繁中語系（一定要在建立 workspace 之前）
  Blockly.setLocale(Blockly.Msg);

  // ✅ 允許學生 / 教師都能進入遊戲
  const s = Auth.requireAnyRole(["student","teacher"]);

  // ✅ 右上角顯示身分
  const badge = document.getElementById("sessionBadge");
  badge.textContent = (s.role === "teacher")
    ? "👩‍🏫 教師模式（已解鎖全關 + 自動載入最佳解法）"
    : `學生：${s.userId}`;

  window.GamePage.init();
</script>
</body>
</html>
