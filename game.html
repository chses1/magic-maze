<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <title>魔法迷宮｜遊戲</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- Blockly CDN（主程式 + 繁中語系） -->
  <script src="https://unpkg.com/blockly/blockly.min.js"></script>
  <script src="https://unpkg.com/blockly/msg/zh-hant.js"></script>

  <script src="levels.js"></script>
  <script src="storage.js"></script>
  <script src="auth.js"></script>
  <script src="blockly_setup.js"></script>
  <script src="game.js"></script>
  <script src="teacher_mode_patch.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1 id="title">遊戲中...</h1>
          <p id="subtitle">用積木控制角色前進、轉向，先拿鑰匙，再走到出口門</p>
        </div>
      </div>
      <div class="badge" id="sessionBadge"></div>
    </div>

    <div class="gameLayout">
      <div class="card stage">
        <div class="stageTop">
          <div class="btnbar" style="margin:0;">
            <button class="primary" id="btnRun">▶ 執行</button>
            <button id="btnReset">↩ 重來</button>
            <button class="danger" id="btnExit">⛔ 離開關卡</button>
          </div>
        </div>

        <div class="stageMiddle">
          <div class="gridWrap" id="gridWrap">
            <div id="grid" class="grid"></div>
          </div>
          <div class="mazeHud" aria-hidden="true">
            <div class="footerToast" id="toast"></div>
            <div class="footerInfo infoPanel legendTicker" id="info" aria-live="polite"></div>
            <div class="footerResult small" id="result"></div>
          </div>
          <div class="mazeResultWrap" id="mazeResultWrap" hidden></div>
        </div>
      </div>

      <div class="card editorCard">
        <div class="editorHead">
          <h2 class="editorTitle">積木工作區</h2>
          <span class="badge editorCodeBadge" id="codeBadge">目前程式碼數／目標程式碼數：<strong id="codeCount">0</strong>/<strong id="targetCodeCount">0</strong></span>
        </div>
        <div class="blocklyWrap">
          <div id="blocklyDiv"></div>
        </div>
        <div class="small editorHint">
          小提醒：先用「向前走」與「左/右轉」，進階再用「重複」減少積木數量。
        </div>
      </div>
    </div>
  </div>

<script>
  // ✅ 啟用繁中語系（一定要在建立 workspace 之前）
  Blockly.setLocale(Blockly.Msg);

  // ✅ 允許學生 / 教師都能進入遊戲
  const s = Auth.requireAnyRole(["student","teacher"]);

  // ✅ 右上角顯示身分
  const badge = document.getElementById("sessionBadge");
  badge.textContent = (s.role === "teacher")
    ? "👩‍🏫 教師模式（已解鎖全關；Ctrl+Shift+T 開啟快捷工具）"
    : `學生：${s.userId}（Ctrl+Shift+T 可開啟開發快捷工具）`;

  window.GamePage.init();
</script>
</body>
</html>
